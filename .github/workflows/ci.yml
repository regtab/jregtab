name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Full suite: 150 benchmark tasks (ATP + RTL variants), unit tests, conformance.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -B test

  # Fast named status for the RTL conformance corpus — referenced by downstream
  # RTL implementations (pyRegTab) that pin this repository as upstream.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: mvn -B test -Dtest="RtlConformanceTest,ConformanceCorpusFreshnessTest"
